<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H2K Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--black:#0a0a0a;--black2:#111;--black3:#1a1a1a;--orange:#e84b17;--orange-dark:#c23d0f;--white:#fff;--grey:#888;--border:#2a2a2a;--radius:10px}
    body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);display:flex;min-height:100vh}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:var(--orange);border-radius:3px}
    .logo-text{font-family:'Montserrat',sans-serif;font-size:1.4rem;font-weight:900;color:var(--white);letter-spacing:-1px;display:flex;align-items:baseline;gap:1px}
    .logo-2{color:var(--orange);font-size:1.6rem}
    .logo-sub{font-size:.4rem;font-weight:700;letter-spacing:3px;color:var(--grey);margin-left:4px;text-transform:uppercase;align-self:flex-end;margin-bottom:1px}

    /* SIDEBAR */
    .sidebar{width:240px;background:var(--black2);border-right:1px solid var(--border);padding:0;flex-shrink:0;position:fixed;top:0;bottom:0;display:flex;flex-direction:column}
    .sidebar-header{padding:1.5rem;border-bottom:1px solid var(--border)}
    .sidebar-header .subtitle{font-size:.65rem;color:var(--grey);text-transform:uppercase;letter-spacing:2px;margin-top:.4rem;font-weight:600}
    .sidebar-nav{flex:1;padding:1rem 0}
    .sidebar-nav a{display:flex;align-items:center;gap:.75rem;padding:.85rem 1.5rem;color:var(--grey);font-size:.82rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .2s;cursor:pointer;border-left:3px solid transparent;text-decoration:none}
    .sidebar-nav a:hover{background:rgba(255,255,255,.03);color:var(--white)}
    .sidebar-nav a.active{color:var(--orange);border-left-color:var(--orange);background:rgba(232,75,23,.05)}
    .sidebar-nav a i{width:16px;text-align:center}
    .sidebar-footer{padding:1.5rem;border-top:1px solid var(--border)}
    .sidebar-footer p{font-size:.7rem;color:var(--grey)}

    /* MAIN */
    .main{margin-left:240px;flex:1;padding:2.5rem}
    .page-header{margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between}
    .page-header h1{font-family:'Montserrat',sans-serif;font-size:1.5rem;font-weight:900;letter-spacing:-1px;display:flex;align-items:center;gap:.5rem}
    .page-header h1 i{color:var(--orange);font-size:1.1rem}
    .panel{display:none}
    .panel.active{display:block;animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    /* STATS */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2.5rem}
    .stat-card{background:var(--black3);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;position:relative;overflow:hidden;transition:border-color .2s}
    .stat-card:hover{border-color:rgba(232,75,23,.4)}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--orange)}
    .stat-card .num{font-family:'Montserrat',sans-serif;font-size:2.2rem;font-weight:900;color:var(--orange);line-height:1}
    .stat-card .label{font-size:.7rem;color:var(--grey);margin-top:.4rem;text-transform:uppercase;letter-spacing:1px;font-weight:600}

    /* FORM CARD */
    .form-card{background:var(--black3);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;max-width:680px}
    .form-row{margin-bottom:1.25rem}
    .form-row label{display:block;font-size:.7rem;font-weight:700;color:var(--grey);margin-bottom:.5rem;text-transform:uppercase;letter-spacing:1px}
    .form-row input,.form-row select,.form-row textarea{width:100%;padding:.7rem 1rem;background:var(--black);border:1px solid var(--border);border-radius:6px;color:var(--white);font-size:.88rem;font-family:'Inter',sans-serif;transition:border-color .2s}
    .form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--orange);outline:none}
    .form-row select{cursor:pointer}
    .form-row select option{background:var(--black)}
    .form-row textarea{resize:vertical;min-height:100px}
    .checkbox-row{display:flex;align-items:center;gap:.75rem;padding:.5rem 0}
    .checkbox-row input[type="checkbox"]{width:18px;height:18px;accent-color:var(--orange);cursor:pointer}
    .checkbox-row label{font-size:.88rem;color:var(--white);text-transform:none;letter-spacing:0;font-weight:500;margin:0;cursor:pointer}

    /* IMAGE PREVIEWS */
    .image-previews{display:flex;gap:.75rem;margin-top:.75rem;flex-wrap:wrap}
    .preview{width:100px;height:76px;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
    .preview img{width:100%;height:100%;object-fit:cover}

    /* BUTTONS */
    .btn{padding:.7rem 1.5rem;border-radius:4px;font-weight:700;font-size:.82rem;font-family:'Inter',sans-serif;transition:all .2s;cursor:pointer;border:none;text-transform:uppercase;letter-spacing:.5px}
    .btn-orange{background:var(--orange);color:var(--white)}
    .btn-orange:hover{background:var(--orange-dark);transform:translateY(-1px)}
    .btn-danger{background:transparent;color:#e74c3c;border:1px solid rgba(231,76,60,.3)}
    .btn-danger:hover{background:rgba(231,76,60,.1)}
    .btn-edit{background:transparent;color:var(--orange);border:1px solid rgba(232,75,23,.3)}
    .btn-edit:hover{background:rgba(232,75,23,.1)}
    .btn-cancel{background:var(--border);color:var(--white)}
    .btn-sm{padding:.4rem .8rem;font-size:.72rem}
    .btn-group{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.25rem}

    /* TABLE */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;background:var(--black3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;font-size:.82rem}
    thead{background:var(--black2)}
    th{text-align:left;padding:.9rem 1rem;font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--grey);font-weight:700;border-bottom:1px solid var(--border)}
    td{padding:.8rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--white)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    .badge{display:inline-block;padding:.2rem .55rem;border-radius:3px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .badge-orange{background:rgba(232,75,23,.12);color:var(--orange);border:1px solid rgba(232,75,23,.2)}
    .badge-green{background:rgba(46,204,113,.1);color:#2ecc71;border:1px solid rgba(46,204,113,.2)}
    .badge-grey{background:rgba(255,255,255,.05);color:var(--grey);border:1px solid var(--border)}
    .actions{display:flex;gap:.4rem;align-items:center}

    /* ALERT BANNER */
    .alert{padding:1rem 1.25rem;border-radius:6px;font-size:.82rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:.6rem}
    .alert-warning{background:rgba(232,75,23,.08);border:1px solid rgba(232,75,23,.25);color:var(--orange)}

    /* TOAST */
    .toast{position:fixed;bottom:24px;right:24px;background:var(--black3);border-left:3px solid var(--orange);border-radius:6px;padding:.85rem 1.5rem;color:var(--white);font-size:.85rem;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:5000;transform:translateX(200px);opacity:0;transition:all .3s}
    .toast.active{transform:translateX(0);opacity:1}
    .toast.error{border-left-color:#e74c3c}
    .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite;margin:2rem auto}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){.sidebar{width:56px}.sidebar-header .logo-sub,.sidebar-header .subtitle,.sidebar-nav a span{display:none}.sidebar-header{padding:1rem .75rem}.main{margin-left:56px;padding:1.5rem}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo-text">h<span class="logo-2">2</span>k<span class="logo-sub">PRODUCTION</span></span>
      <div class="subtitle">Admin Panel</div>
    </div>
    <nav class="sidebar-nav">
      <a class="active" data-panel="dashboard"><i class="fas fa-chart-bar"></i><span>Dashboard</span></a>
      <a data-panel="add"><i class="fas fa-plus-circle"></i><span>Add Product</span></a>
      <a data-panel="manage"><i class="fas fa-list"></i><span>Manage</span></a>
    </nav>
    <div class="sidebar-footer"><p>H2K Production © 2026</p></div>
  </aside>

  <div class="main">
    <!-- DASHBOARD -->
    <div class="panel active" id="panel-dashboard">
      <div class="page-header"><h1><i class="fas fa-chart-bar"></i> Dashboard</h1></div>
      <div class="stats" id="stats"><div class="spinner"></div></div>
    </div>

    <!-- ADD / EDIT PRODUCT -->
    <div class="panel" id="panel-add">
      <div class="page-header">
        <h1 id="formTitle"><i class="fas fa-plus-circle"></i> Add Product</h1>
      </div>
      <div class="alert alert-warning" id="serviceKeyAlert" style="display:none">
        <i class="fas fa-exclamation-triangle"></i>
        Service Role Key not set. Open admin.js and replace <strong>YOUR_SERVICE_ROLE_KEY</strong>.
      </div>
      <div class="form-card">
        <form id="productForm">
          <input type="hidden" id="editId">
          <div class="form-row"><label>Product Name *</label><input type="text" id="pName" required placeholder="e.g. ARRI SkyPanel S60-C"></div>
          <div class="form-row">
            <label>Category *</label>
            <select id="pCategory" required>
              <option value="">— Select category —</option>
              <option value="lights">Lights</option>
              <option value="camera">Camera</option>
              <option value="voice">Voice</option>
              <option value="light-accessories">Light Accessories</option>
              <option value="lenses">Lenses</option>
              <option value="cargovan">Cargo Van</option>
            </select>
          </div>
          <div class="form-row"><label>Description (optional)</label><textarea id="pDesc" placeholder="Product description..."></textarea></div>
          <div class="form-row">
            <label>Images (up to 3)</label>
            <input type="file" id="pImages" accept="image/*" multiple>
            <div class="image-previews" id="imgPreviews"></div>
          </div>
          <div class="form-row"><div class="checkbox-row"><input type="checkbox" id="pTopRated"><label for="pTopRated">Mark as Top Rated</label></div></div>
          <div class="btn-group">
            <button type="submit" class="btn btn-orange" id="submitBtn"><i class="fas fa-save"></i> Add Product</button>
            <button type="button" class="btn btn-cancel" id="cancelEdit" style="display:none"><i class="fas fa-times"></i> Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- MANAGE -->
    <div class="panel" id="panel-manage">
      <div class="page-header">
        <h1><i class="fas fa-list"></i> Manage Products</h1>
        <button class="btn btn-orange btn-sm" id="refreshBtn"><i class="fas fa-refresh"></i> Refresh</button>
      </div>
      <div class="table-wrap" id="productsTable"><div class="spinner"></div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script type="module" src="admin.js"></script>
</body>
</html>
